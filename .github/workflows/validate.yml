name: validate

# Blocks any change whose data doesn't pass the integrity check.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # No dependencies to install — the validator is zero-dep Node.
      - name: Validate exercise library
        run: npm run validate
